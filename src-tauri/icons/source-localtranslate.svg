<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0b2a6b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Translation card -->
  <g filter="url(#shadow)">
    <rect x="188" y="236" width="648" height="552" rx="48" fill="#ffffff"/>
  </g>

  <!-- Latin "A" (source) -->
  <text x="360" y="560" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="240" font-weight="800" fill="#2563eb">A</text>

  <!-- CJK glyph 文 (target language) -->
  <text x="676" y="620" text-anchor="middle"
        font-family="'Yu Gothic','Microsoft YaHei','Noto Sans CJK SC', sans-serif"
        font-size="240" font-weight="700" fill="#06b6d4">文</text>

  <!-- Arrow between them -->
  <g stroke="#94a3b8" stroke-width="20" stroke-linecap="round" fill="none">
    <path d="M470 480 H560"/>
    <path d="M528 448 l40 32 l-40 32"/>
  </g>

  <!-- Easter egg: "Taylor" handwritten across the card -->
  <text x="512" y="728" text-anchor="middle"
        font-family="'Segoe Script','Brush Script MT','Comic Sans MS',cursive"
        font-size="96" font-style="italic" font-weight="700"
        fill="#2563eb">Taylor</text>
</svg>
